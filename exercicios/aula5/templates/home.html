<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil</title>
</head>
<body>
    {% if user %}
        <h1>Perfil de {{ user.nome }}</h1>
        <p><strong>Bio:</strong> {{ user.bio }}</p>
        
        <button onclick="document.cookie = 'session_user=; Max-Age=0'; window.location.href='/'">Sair</button>
    {% else %}
        <p>Por favor, faça login para acessar seu perfil.</p>
    {% endif %}
</body>
</html>
