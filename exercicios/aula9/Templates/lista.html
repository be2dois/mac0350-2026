<div>
    <input type="text" 
        name="busca" 
        placeholder="Buscar..."
        hx-get="/lista"
        hx-trigger="input changed delay:500ms"
        hx-select="#lista"
        hx-target="#lista"
        hx-indicator="#indicator"
        value="{{ busca }}">

    <img id="indicator" class="htmx-indicator" src="/Static/spinner.svg" alt="Carregando..."/>
</div>
<div id="lista">
    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>

    <div class="paginacao">
        {% if pagina > 1 %}
            <button hx-get="/lista?busca={{ busca }}&pagina={{ pagina - 1 }}"
                    hx-target="#lista"
                    hx-select="#lista"
                    hx-indicator="#loading-spinner"> Anterior
            </button>
        {% endif %}

        <span>Página {{ pagina }}</span>

        {% if proxima %}
            <button hx-get="/lista?busca={{ busca }}&pagina={{ pagina + 1 }}"
                    hx-target="#lista"
                    hx-select="#lista"
                    hx-indicator="#loading-spinner">
                Próxima
            </button>
        {% endif %}
    </div>
</div>
